<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <h1>Exemplo de formulário</h1>
    <form action="cadastro.php" method="post">
        <p>
            <label for="icor">Cor</label>
             <input type="color" name="cor" id="icor" value="#93ff52">
        </p>
        <p>
            <label for="iniv">Nivel de satisfação</label>
            <input type="range" name="niv" id="iniv" min="0" max="5">
        </p>
        <p>
            <label for="ifot">Foto de perfil</label>
            <input type="file" name="fot" id="ifot">
        </p>
        <p>
            <input type="submit" value="enviar">
            <input type="reset" value="limpar">
        </p>
    </form>
</body>
</html>
