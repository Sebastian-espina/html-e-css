<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<body>
    <h1>Exemplo de formulario</h1>
    <form action="cadastro.php" method="get" autocomplete="off">
        <p>
            <label for="iest">Estado</label>
            <select name="est" id="iest">
                <option value="" selected>--Faça uma escolha--</option>
                <optgroup label="Estados ruins">
                    <option value="RR">Roraima</option>
                    <option value="SP">São Paulo</option>
                </optgroup>
                <optgroup label="Estados legais">
                    <option value="PR">Parana</option>
                    <option value="SC">Santa Catarina</option>
                    <option value="PA">Para</option>
                </optgroup>    
            </select>
        </p>
        <p>
            <label for="iprof">Profissão</label>
            <input type="text" name="prof" id="iprof" list="ilist">
            <datalist id="ilist">
                <option value="DEV">Desenvolvedor</option>
                <option value="ADM">Administrador</option>
                <option value="PRO">Professor</option>
                <option value="CONT">Contador</option>
                <option value="ANA">Analista</option>
            </datalist>
        </p>
        <p>
            <label for="imsg">Mensagens :</label>
            <textarea name="msg" id="imsg" cols="30" rows="10" placeholder="Sua mensagem aqui"></textarea> 
        </p>
        <p>
            <input type="submit" value="enviar">
            <input type="reset" value="limpar">
        </p>
    </form>
</body>
</html>
