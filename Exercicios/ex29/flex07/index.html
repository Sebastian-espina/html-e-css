<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible box</title>
    <style>
        .container {
            background-color: aqua;
            display: flex;
        }

        .item {
            margin: 2px;
            text-align: center;
            background-color: blueviolet;
            border: 1px solid black;
        }

        #i1 { order: -2;}
        #i2 { order: -4;}
        #i3 { order: 8;}
        #i4 { order: 2;}
        #i5 { order: 9;}
        #i6 { order: 2;}
        #i7 { order: -5;}

    </style>
</head>
<body>
    <div class="container">
        <div class="item" id="i1">A</div>
        <div class="item" id="i2">B</div>
        <div class="item" id="i3">C</div>
        <div class="item" id="i4">D</div>
        <div class="item" id="i5">E</div>
        <div class="item" id="i6">F</div>
        <div class="item" id="i7">G</div>
    </div>
</body>
</html>
