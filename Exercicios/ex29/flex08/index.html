<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible box</title>
    <style>
        .container {
            background-color: aqua;
            display: flex;
            height: 500px;
            align-items: flex-start;
        }

        .item {
            margin: 2px;
            text-align: center;
            background-color: blueviolet;
            border: 1px solid black;
            padding: 10px;
        }

        #i1 {align-self: center;}
        #i2 {align-self: stretch;}
        #i3 {align-self: flex-end;}
        #i4 {align-self: stretch;}
        #i5 {align-self: flex-end;}
        #i6 {align-self: start;}
        #i7 {align-self: end;}

    </style>
</head>
<body>
    <div class="container">
        <div class="item" id="i1">A</div>
        <div class="item" id="i2">B</div>
        <div class="item" id="i3">C</div>
        <div class="item" id="i4">D</div>
        <div class="item" id="i5">E</div>
        <div class="item" id="i6">F</div>
        <div class="item" id="i7">G</div>
    </div>
</body>
</html>
