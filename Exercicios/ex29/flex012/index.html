<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible box</title>
    <style>
        .container {
            background-color: aqua;
           
            display: flex;
            flex-flow: row nowrap;
            
        }

        .item {
            margin: 2px;
            text-align: center;
            background-color: blueviolet;
            border: 1px solid black;
        }

        #a {
            /* flex-basis: 300px;
            flex-shrink: 2; 
            flex-grow: 0; */

            flex: 0 2 300px;
        } 
        #b {
            /* flex-basis: 300px;
            flex-shrink: 0; 
            flex-grow: 1; */

            flex: 1 0 150px; 
        } 
        #c {
            /* flex-basis: 300px;
            flex-shrink: 1;
            flex-grow: 2; */

            flex: 2 1 auto;
        } 
    </style>
</head>
<body>
    <div class="container">
        <div class="item" id="a">A</div>
        <div class="item" id="b">B</div>
        <div class="item" id="c">C</div>
    </div>
</body>
</html>
