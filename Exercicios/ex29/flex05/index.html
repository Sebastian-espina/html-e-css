<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox centralizado</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            background-color: chocolate;
        }

        main {
            background-color: plum;
            width: 100vw;
            height: 100vh;

            display: flex;
            flex-flow: row nowrap;
            justify-content: center;
            align-items: center;

        }

        section {
            background-color: blueviolet;
            width: 200px;
            height: 200px;
            text-align: center;
        }

        h1 {
            padding-top: 40%;
        }


    </style>
</head>
<body>
    <main>
        <section>
            <h1>Tela de login</h1>
        </section>
    </main>
</body>
</html>
