<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
         body {
            font-family: Arial, Helvetica, sans-serif;
        }
        table {
            border-collapse: collapse;
            width: 600px;
            margin-bottom: 100px;
        }

        caption {
            padding: 10px;
            background-color: darkgray;
            font-weight: bold;
            color: white;
        }

        td, th {
            border: 1px solid black;
            padding: 10px;
        }


        th {
            color: white;
            background-color: gray;
        }
        
        .cnome {
            background-color: aquamarine;
        }
    </style>
</head>
<body>
    <table>
        <colgroup>
            <col class="cnome">
            <col class="cidade">
            <col class="csexo">
            <col class="cprofissão">
        </colgroup>
        <caption>Cadastros</caption>
        <tr>
            <th scope="col">Nome</th>
            <th scope="col">Idade</th>
            <th scope="col">Sexo</th>
            <th scope="col">Profissão</th>
        </tr>
        <tr class="destaque">
            <td>Ana Maria</td>
            <td>22</td>
            <td>Femenino</td>
            <td>Jornalista</td>
        </tr>
        <tr>
            <td>Claudio</td>
            <td>28</td>
            <td>Masculino</td>
            <td>Programador</td>
        </tr>
        <tr class="destaque">
            <td>Helio</td>
            <td>19</td>
            <td>Masculino</td>
            <td>Vendedor</td>
        </tr>
        <tr>
            <td>Vitoria</td>
            <td>28</td>
            <td>Femenino</td>
            <td>Médica</td>
        </tr>
        <tr>
            <td>Gustavo</td>
            <td>42</td>
            <td>Masculino</td>
            <td>Professor</td>
        </tr>
        <tr>
            <td>Otavio</td>
            <td>22</td>
            <td>Masculino</td>
            <td>Nutricionista</td>
        </tr>
    </table>
</body>
</html>
